[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/auth"
  to   = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/claude"
  to   = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/deepgram"
  to   = "/.netlify/functions/deepgram"
  status = 200

[[redirects]]
  from = "/app"
  to   = "/app.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"

[[headers]]
  for = "/app.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com wss://api.deepgram.com https://api.deepgram.com; media-src 'self' blob:;"
