# 2ndChair — Netlify Configuration

[build]
  publish = "public"
  functions = "netlify/functions"

# Route all /api/* requests to serverless functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Clean URL for app
[[redirects]]
  from   = "/app"
  to     = "/app.html"
  status = 200

# ── Global security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# CSP for landing page
[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'"

# CSP for the app — must allow Deepgram WebSocket
[[headers]]
  for = "/app.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self' wss://api.deepgram.com https://api.deepgram.com; img-src 'self' data:; frame-ancestors 'none'; media-src 'self' blob:;"
    Cache-Control = "no-store"

# Never cache function responses
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
